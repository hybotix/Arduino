; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = portenta_c33

[env:portenta_c33]
platform = renesas-ra
board = portenta_c33
framework = arduino
build_flags = -I include
lib_deps = 
	facchinm/Arduino_USBHostMbed5@^0.1.1
	robtillaart/DS3232@^0.5.0
	adafruit/Adafruit LIS3MDL@^1.2.4
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/Adafruit SHT4x Library@^1.0.5
	adafruit/Adafruit VEML7700 Library@^2.1.6
	sensirion/Sensirion I2C SCD4x@^0.4.0
	adafruit/Adafruit BNO055@^1.6.3
	file:///storage/Downloads/Arduino/Libraries/SparkFun_I2C_Mux_Arduino_Library-master.zip
	sciosense/ScioSense_ENS16x@^1.0.0
	adafruit/ENS160 - Adafruit Fork@^3.0.1
	sparkfun/SparkFun Indoor Air Quality Sensor - ENS160@^1.1.0
	256dpi/MQTT@^2.5.2
	arduino-libraries/Arduino_LSM6DSOX@^1.1.2
